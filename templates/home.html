<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction</title>

```
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #1d4350, #a43931);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 650px;
        background: white;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.3);
    }

    h1 {
        text-align: center;
        color: #333;
        margin-bottom: 25px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
        color: #444;
    }

    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
    }

    input:focus {
        outline: none;
        border-color: #ff5722;
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #ff5722;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 17px;
        cursor: pointer;
    }

    .submit-btn:hover {
        background: #e64a19;
    }

    .result {
        margin-top: 25px;
        text-align: center;
    }

    .prediction {
        color: green;
        font-size: 24px;
        font-weight: bold;
    }
</style>
```

</head>

<body>

```
<div class="container">

    <h1>🔥 Algerian Forest Fire Prediction</h1>

    <form action="/predictdata" method="POST">

        <div class="form-group">
            <label>Temperature</label>
            <input type="number" step="any" name="Temperature" required>
        </div>

        <div class="form-group">
            <label>Relative Humidity (RH)</label>
            <input type="number" step="any" name="RH" required>
        </div>

        <div class="form-group">
            <label>Wind Speed (Ws)</label>
            <input type="number" step="any" name="Ws" required>
        </div>

        <div class="form-group">
            <label>Rain</label>
            <input type="number" step="any" name="Rain" required>
        </div>

        <div class="form-group">
            <label>FFMC</label>
            <input type="number" step="any" name="FFMC" required>
        </div>

        <div class="form-group">
            <label>DMC</label>
            <input type="number" step="any" name="DMC" required>
        </div>

        <div class="form-group">
            <label>ISI</label>
            <input type="number" step="any" name="ISI" required>
        </div>

        <div class="form-group">
            <label>Classes (0 = Not Fire, 1 = Fire)</label>
            <input type="number" min="0" max="1" name="Classes" required>
        </div>

        <div class="form-group">
            <label>Region (0 = Bejaia, 1 = Sidi-Bel Abbes)</label>
            <input type="number" min="0" max="1" name="Region" required>
        </div>

        <button type="submit" class="submit-btn">
            Submit
        </button>

    </form>

    <div class="result">
        {% if results %}
            <p class="prediction">
                The FWI Prediction is: {{ results }}
            </p>
        {% endif %}
    </div>

</div>
```

</body>

</html>
